<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LlamaLearn</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="hero">
    <h1>LlamaLearn 🦙</h1>
    <p>Turn your notes into flashcards, quiz questions, and study guides in seconds.</p>
  </header>

  <main class="container">
    <section class="card input-section">
      <h2>Paste Your Notes</h2>
      <textarea id="notesInput" placeholder="Paste your class notes here...&#10;&#10;Example:&#10;Budget: A financial plan for expected income and expenses.&#10;Assets are resources a company owns.&#10;Liabilities are debts a company owes."></textarea>
      <button id="generateBtn">Generate Study Set</button>
    </section>

    <section id="resultsSection" class="results hidden">
      <section class="card">
        <h2>Terms & Definitions</h2>
        <div id="termsList"></div>
      </section>

      <section class="card">
        <h2>Flashcards</h2>
        <div id="flashcardsContainer" class="flashcards-grid"></div>
      </section>

      <section class="card">
        <h2>Multiple Choice Questions</h2>
        <div id="mcqContainer"></div>
      </section>

      <section class="card">
        <h2>Short Answer Questions</h2>
        <div id="shortAnswerContainer"></div>
      </section>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
