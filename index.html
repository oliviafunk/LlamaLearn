<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>LlamaLearn</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <header class="hero">
    <h1>LlamaLearn 🦙</h1>
    <p>Turn your notes into flashcards, quizzes, and study tools instantly.</p>
  </header>

  <main class="container">

    <section class="card input-section">
      <h2>Paste Your Notes</h2>

      <label for="studySetTitle"><strong>Study Set Title</strong></label>
      <input
        type="text"
        id="studySetTitle"
        placeholder="Example: Finance Exam 1 Review"
      />

      <textarea id="notesInput" placeholder="Paste your notes here..."></textarea>

      <div class="button-row">
        <button id="generateBtn">Generate Study Set</button>
        <button id="saveBtn" class="secondary-btn" type="button">Save Study Set</button>
      </div>
    </section>

    <section class="card">
      <h2>Saved Study Sets</h2>
      <div id="savedSetsList" class="saved-sets-list">
        <p class="empty-state">No saved study sets yet.</p>
      </div>
    </section>

    <section id="resultsSection" class="hidden">

      <section class="card collapsible-card">
        <button class="collapse-toggle" type="button">
          Terms & Definitions <span class="arrow">▼</span>
        </button>
        <div class="collapse-content">
          <div id="termsList"></div>
        </div>
      </section>

      <section class="card collapsible-card">
        <button class="collapse-toggle" type="button">
          Flashcards <span class="arrow">▼</span>
        </button>
        <div class="collapse-content">
          <div id="flashcardsContainer" class="flashcards-grid"></div>
        </div>
      </section>

      <section class="card collapsible-card">
        <button class="collapse-toggle" type="button">
          Multiple Choice <span class="arrow">▼</span>
        </button>
        <div class="collapse-content">
          <div id="mcqContainer"></div>
        </div>
      </section>

      <section class="card collapsible-card">
        <button class="collapse-toggle" type="button">
          Short Answer <span class="arrow">▼</span>
        </button>
        <div class="collapse-content">
          <div id="shortAnswerContainer"></div>
        </div>
      </section>

    </section>

  </main>

  <script src="script.js"></script>
</body>
</html>
